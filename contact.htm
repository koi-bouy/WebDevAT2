<!DOCTYPE html>
<html lang="en-AU">

<head>
    <title>Contact Us</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        main {
            flex: 100vw;
        }
    </style>
    <script>
        function validate(e) {
            const input = e.target;
            const text = input.value.trim();
            const injection = /<\s*(?:\/\s*)?script\s*?(?:\s[^>]*)?>/i;

            if (text === "") {
                input.setCustomValidity("Please fill out this field.");
            } else if (injection.test(text)) {
                input.setCustomValidity("Oi! No <script> injections!");
            }
            else {
                input.setCustomValidity("");
            }

            input.reportValidity();

        }
    </script>
</head>

<body>
    <header>
        <h1 id="pageTitle">Contact Form</h1>
    </header>
    <nav>
        <ul class="navbar">
            <li><a href="index.htm">Home</a></li>
            <li><a href="minerals.htm">Minerals</a></li>
            <li><a href="companies.htm">Companies</a></li>
            <li><a href="equipment.htm">Equipment</a></li>
            <li><a href="contact.htm">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <!-- Centers the company table on the page. -->
        <main class="center">
            <form onsubmit="validateInput(event)" action="requests.php" method="post">
                <span id="err"></span>
                <!-- Input fields -->
                <!-- name -->
                <label for="requestor">Surname and other names</label>
                <input oninput="validate(event)" type="text" name="requestor" id="requestor" value="">
                <!-- email -->
                <label for="email">Contact email Address</label>
                <input oninput="validate(event)" type="email" name="email" id="email" value="">
                <!-- phone-->
                <label for="phone">Contact phone Number</label>
                <input oninput="validate(event)" type="tel" name="phone" id="phone" value="">
                <!-- request type dropdown-->
                <label for="infotype">Information Type</label>
                <select oninput="validate(event)" name="infotype" id="infotype">
                    <option value="" selected hidden>Select an option</option>
                    <option value="company">Company</option>
                    <option value="mineral">Mineral</option>
                    <option value="equipment">Equipment</option>

                </select>
                <!-- textarea for request body-->
                <label for="request">Request Description</label>
                <textarea oninput="val(event)" name="request" id="request"></textarea>
                <!-- submit button -->
                <br>
                <div>
                    <input type="submit" class="button" value="Submit Request">

                    <!-- Goto requests without submitting -->
                    <input type="button" class="button" value="View Requests"
                        onclick="window.location.href='requests.php'">
                </div>
            </form>
        </main>
    </div>

                Unsplash

        </p>
    </footer>
</body>

</html>
