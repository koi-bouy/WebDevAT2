        <!-- Centers the company table on the page. -->

            <form action="additem.php" method="post">
                <!-- Input fields -->
                <!-- name -->
                <input type="text" name="requestor" id="requestor" value="John Smith">
                <br>
                <!-- email -->
                <input type="email" name="email" id="email" value="JSmith@example.com">
                <br>
                <!-- phone-->
                <input type="tel" name="phone" id="phone" value="0456789123">

                <!-- request type dropdown-->
                <select name="infotype" id="infotype">
                    <option value="company">Company</option>
                    <option value="mineral">Mineral</option>
                    <option value="equipment">Equipment</option>

                </select>
                <br>
                <!-- textarea for request body-->
                <textarea name="request" id="request"></textarea>
                <br>
                <!-- submit button -->
                <br>
                <input type="submit" value="Submit Request">
            </form>
