<!DOCTYPE html>
<html lang="en-AU">

<head>
    <meta charset="utf-8">
    <title>Images</title>

    <link rel="stylesheet" href="css/styles.css">

</head>

<body class="embed">
    <div class="frame" id="select">
        <p style="font-size: 6.6vh; text-align: center;">
            Select one of the equipment names to the right to view its image here.
        </p>
    </div>
    <div class="frame" id="driller">
        <img src="images/driller_rig.jpg" alt="driller rig">
        <a class="sourceLink" href="https://www.mckaydrilling.com.au/" target="_blank">Image Source</a>

    </div>
    <div class="frame" id="haulpak">
        <img src="images/haulpak.jpg" alt="haulpak">
        <a class="sourceLink"
            href="https://en.wikipedia.org/wiki/Haulpak#/media/File:WABCO_Haulpak,_Newman,_2016_(01).JPG"
            target="_blank">Image
            Source</a>
    </div>
    <div class="frame" id="scraper">
        <img src="images/scraper.png" alt="scraper">
        <a class="sourceLink"
            href="https://blog.iseekplant.com.au/blog/types-of-scraper-machines-used-on-construction-sites"
            target="_blank">Image
            Source</a>
    </div>
</body>

</html>
